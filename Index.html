<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FailLimit</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #89b4fa;
  }

  .card {
    background: #313244;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
  }

  input {
    width: 60px;
    padding: 8px;
    margin-right: 10px;
    border-radius: 8px;
    border: none;
    background: #1e1e2e;
    color: white;
  }

  button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 5px;
  }

  .add { background: #89b4fa; }
  .remove { background: #f38ba8; }
  .calc { background: #a6e3a1; width: 100%; }
  .worst { background: #fab387; width: 100%; }

  .list {
    margin-top: 10px;
    font-size: 14px;
  }

  .result {
    text-align: center;
    font-size: 18px;
    margin-top: 10px;
    color: #a6e3a1;
  }
</style>
</head>

<body>

<div class="container">
  <h1>FailLimit</h1>

  <!-- KL -->
  <div class="card">
    <h3>KL / Mündlich</h3>
    <input type="number" id="klInput" min="1" max="6">
    <button class="add" onclick="addNote('kl')">+</button>
    <button class="remove" onclick="removeNote('kl')">-</button>
    <div class="list" id="klList">[]</div>
  </div>

  <!-- SchA -->
  <div class="card">
    <h3>Schulaufgaben</h3>
    <input type="number" id="schaInput" min="1" max="6">
    <button class="add" onclick="addNote('scha')">+</button>
    <button class="remove" onclick="removeNote('scha')">-</button>
    <div class="list" id="schaList">[]</div>
  </div>

  <!-- Gewicht -->
  <div class="card">
    <h3>Gewichtung SchA</h3>
    <input type="number" id="weight" value="2">
  </div>

  <button class="calc" onclick="calculate()">Schnitt Berechnen</button>
  <button class="worst" onclick="worstCase()">Worst Case brechnen</button>

  <div class="result" id="result">Schnitt: -</div>
  <div class="result" id="worst">Max 6er: -</div>
</div>

<script>
let kl = [];
let scha = [];

function updateUI() {
  document.getElementById("klList").innerText = JSON.stringify(kl);
  document.getElementById("schaList").innerText = JSON.stringify(scha);
}

function addNote(type) {
  const input = document.getElementById(type + "Input");
  const val = parseInt(input.value);

  if (val >= 1 && val <= 6) {
    if (type === "kl") kl.push(val);
    else scha.push(val);
    input.value = "";
    updateUI();
  } else {
    alert("Note muss 1–6 sein");
  }
}

function removeNote(type) {
  if (type === "kl" && kl.length) kl.pop();
  if (type === "scha" && scha.length) scha.pop();
  updateUI();
}

function avg(arr) {
  if (arr.length === 0) return null;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function calculate() {
  const weight = parseInt(document.getElementById("weight").value);

  const klAvg = avg(kl);
  const schaAvg = avg(scha);

  let total;

  if (klAvg === null && schaAvg === null) {
    document.getElementById("result").innerText = "Keine Noten";
    return;
  } else if (klAvg === null) total = schaAvg;
  else if (schaAvg === null) total = klAvg;
  else total = (schaAvg * weight + klAvg) / (weight + 1);

  document.getElementById("result").innerText = "Schnitt: " + total.toFixed(2);
}

function worstCase() {
  const weight = parseInt(document.getElementById("weight").value);

  let klAvg = avg(kl);
  let schaAvg = avg(scha);

  // SchA
  let testScha = [...scha];
  let countScha = 0;

  while (true) {
    testScha.push(6);
    let newAvg = avg(testScha);
    let total = klAvg === null ? newAvg : (newAvg * weight + klAvg)/(weight+1);

    if (total >= 4.5) {
      testScha.pop();
      break;
    }
    countScha++;
  }

  // KL
  let testKl = [...kl];
  let countKl = 0;

  while (true) {
    testKl.push(6);
    let newAvg = avg(testKl);
    let total = schaAvg === null ? newAvg : (schaAvg * weight + newAvg)/(weight+1);

    if (total >= 4.5) {
      testKl.pop();
      break;
    }
    countKl++;
  }

  document.getElementById("worst").innerText =
    "Max 6er → SchA: " + countScha + " | KL: " + countKl;
}
</script>

</body>
</html>
